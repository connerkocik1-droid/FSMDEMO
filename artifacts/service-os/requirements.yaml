packages:
  "@clerk/clerk-react": "Authentication and user management"
  "recharts": "Dashboard analytics charts and data visualization"
  "date-fns": "Human-readable date formatting"
  "framer-motion": "Page transitions and smooth micro-interactions"
  "react-hook-form": "Form state management"
  "@hookform/resolvers": "Zod validation for forms"
  "zod": "Schema validation"
  "clsx": "Utility for conditionally joining classNames"
  "tailwind-merge": "Utility for merging tailwind classes without conflicts"

images:
  - path: "artifacts/service-os/public/images/hero-bg.png"
    description: "Abstract modern dark geometric background with electric blue and cyan edge lighting, professional SaaS software aesthetic"
    aspect_ratio: "16:9"
  - path: "artifacts/service-os/public/images/logo.png"
    description: "Clean minimal geometric logo mark in electric blue and teal for a modern field service business software, transparent background"
    aspect_ratio: "1:1"

notes:
  - "The app uses Clerk for auth. If VITE_CLERK_PUBLISHABLE_KEY is missing, it falls back to a mocked auth state to ensure the UI is fully previewable."
  - "Assumes standard shadcn/ui components are available in @/components/ui/."
  - "Uses @workspace/api-client-react for all data fetching hooks."
