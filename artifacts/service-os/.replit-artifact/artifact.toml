kind = "web"
previewPath = "/"
title = "ServiceOS"
version = "1.0.0"
id = "artifacts/service-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20461
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/service-os run dev"

[services.env]
PORT = "20461"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/service-os", "run", "build"]
publicDir = "artifacts/service-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
