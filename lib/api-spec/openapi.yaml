        - name
      properties:
        name:
          type: string
        address:
          type: string
        adminUserId:
          type: integer

    ApiKey:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
        keyPreview:
          type: string
        lastUsedAt:
          type: string
          format: date-time
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - isActive

    ApiKeysResponse:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/ApiKey"
      required:
        - keys

    ApiKeyCreated:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
        key:
          type: string
        message:
          type: string
      required:
        - id
        - key
